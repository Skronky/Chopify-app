<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Chopify</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:'Outfit',sans-serif; background:#0a0a0a; color:#fff; overflow:hidden; -webkit-font-smoothing:antialiased; }
#app { display:flex; flex-direction:column; height:100vh; height:100dvh; }
#page { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:200px; }
::-webkit-scrollbar { width:0; }

/* SEARCH */
#search-wrap { padding:56px 16px 12px; background:#0a0a0a; position:sticky; top:0; z-index:10; }
#search-box { display:flex; align-items:center; gap:10px; background:#1c1c1c; border-radius:12px; padding:12px 16px; border:1px solid #2c2c2c; }
#search-box svg { color:#555; flex-shrink:0; }
#search-input { flex:1; background:none; border:none; outline:none; font-size:15px; font-family:‘Outfit’,sans-serif; color:#fff; }
#search-input::placeholder { color:#555; }

/* RESULTS */
#results { display:flex; flex-direction:column; }
.row { display:flex; align-items:center; gap:12px; padding:10px 16px; }
.row img { width:52px; height:52px; border-radius:10px; object-fit:cover; background:#242424; flex-shrink:0; pointer-events:none; }
.row-info { flex:1; min-width:0; pointer-events:none; }
.row-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-title.playing { color:#1db954; }
.row-artist { font-size:12px; color:#a0a0a0; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.like-btn { background:none; border:none; cursor:pointer; padding:8px; color:#555; display:flex; flex-shrink:0; }
.like-btn.liked { color:#1db954; }

/* STATUS */
#status { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:12px; color:#555; text-align:center; }
#status p { font-size:14px; }
.dots { display:flex; gap:6px; }
.dot { width:7px; height:7px; border-radius:50%; background:#1db954; animation:bounce 1.1s infinite; }
.dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}

/* MINI PLAYER */
#mini {
position:fixed; bottom:calc(60px + env(safe-area-inset-bottom,0px)); left:8px; right:8px;
background:#1c1c1c; border:1px solid #2c2c2c; border-radius:14px;
padding:10px 14px;
display:none; flex-direction:column; gap:10px;
z-index:50;
}
#mini.show { display:flex; }
#mini-prog { height:2px; background:#2c2c2c; border-radius:1px; }
#mini-prog-fill { height:100%; background:#1db954; border-radius:1px; width:0%; transition:width 0.5s linear; }
#mini-row { display:flex; align-items:center; gap:12px; cursor:pointer; }
#mini-img { width:46px; height:46px; border-radius:8px; object-fit:cover; background:#242424; flex-shrink:0; }
#mini-info { flex:1; min-width:0; }
#mini-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#mini-artist { font-size:11px; color:#a0a0a0; margin-top:2px; }
#mini-btns { display:flex; align-items:center; gap:16px; }
#mini-btns button { background:none; border:none; color:#fff; cursor:pointer; padding:4px; display:flex; }

/* NOW PLAYING */
#np {
position:fixed; inset:0; z-index:100;
background:#0a0a0a;
display:flex; flex-direction:column;
padding-top:env(safe-area-inset-top,24px);
transform:translateY(100%);
transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#np.open { transform:translateY(0); }
#np-close-btn { background:none; border:none; color:#888; cursor:pointer; padding:14px 20px; display:flex; align-items:center; gap:8px; font-size:14px; font-family:‘Outfit’,sans-serif; }
#np-art-wrap { padding:0 32px 24px; }
#np-art { width:100%; aspect-ratio:1; border-radius:16px; object-fit:cover; background:#1c1c1c; display:block; box-shadow:0 16px 48px rgba(0,0,0,0.6); }
#np-info-row { display:flex; align-items:center; padding:0 24px 16px; gap:12px; }
#np-texts { flex:1; min-width:0; }
#np-title { font-family:‘Bebas Neue’,sans-serif; font-size:30px; letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#np-artist-txt { font-size:14px; color:#a0a0a0; margin-top:4px; }
#np-heart-btn { background:none; border:none; cursor:pointer; color:#555; padding:6px; display:flex; flex-shrink:0; }
#np-heart-btn.liked { color:#1db954; }
#np-prog-section { padding:0 24px 8px; }
#np-bar { width:100%; height:4px; background:#242424; border-radius:2px; margin-bottom:8px; cursor:pointer; }
#np-bar-fill { height:100%; background:#fff; border-radius:2px; width:0%; pointer-events:none; }
#np-times { display:flex; justify-content:space-between; font-size:11px; color:#555; }
#np-ctrl-row { display:flex; align-items:center; justify-content:space-between; padding:16px 32px 0; }
#np-ctrl-row button { background:none; border:none; cursor:pointer; color:#a0a0a0; padding:8px; display:flex; align-items:center; }
#np-ctrl-row button.active { color:#1db954; }
#np-play-btn { width:62px; height:62px; border-radius:50%; background:#fff !important; color:#000 !important; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#np-play-btn:active { transform:scale(0.95); }

#yt-player { display:none !important; }

/* BOTTOM NAV */
#bnav { position:fixed; bottom:0; left:0; right:0; height:calc(60px + env(safe-area-inset-bottom,0px)); background:#0d0d0d; border-top:1px solid #2c2c2c; display:flex; align-items:flex-start; padding-top:8px; z-index:60; }
.ntab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; color:#555; border:none; background:none; font-family:‘Outfit’,sans-serif; }
.ntab.active { color:#1db954; }
.ntab span { font-size:10px; font-weight:600; }

/* PAGES */
.pg { display:none; }
.pg.active { display:block; }

/* HOME */
#home-header { padding:56px 20px 20px; }
#home-greeting { font-size:12px; font-weight:600; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:6px; }
#home-title { font-family:‘Bebas Neue’,sans-serif; font-size:42px; letter-spacing:0.5px; line-height:1; }
#home-title span { color:#1db954; }
.sec { padding:8px 0 16px; }
.sec-head { display:flex; align-items:center; justify-content:space-between; padding:0 16px 12px; }
.sec-title { font-size:18px; font-weight:700; }
.hscroll { display:flex; gap:12px; padding:0 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.hscroll::-webkit-scrollbar { display:none; }
.hcard { flex-shrink:0; width:130px; cursor:pointer; }
.hcard img { width:130px; height:130px; border-radius:12px; object-fit:cover; background:#1c1c1c; margin-bottom:8px; display:block; }
.hcard-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hcard-artist { font-size:11px; color:#a0a0a0; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-empty { display:flex; flex-direction:column; align-items:center; padding:60px 20px; gap:12px; color:#555; text-align:center; }
.home-empty p { font-size:14px; }
</style>

</head>

<script>
var YT_KEY = 'AIzaSyCk_AuxfMGwuPxsrp7K-UV7nH6D76EZn9M';
var liked = JSON.parse(localStorage.getItem('ch_liked') || '[]');
var queue = [];
var qIdx = -1;
var curSong = null;
var isPlaying = false;
var isShuffle = false;
var repeatMode = 0;
var yt = null;
var ytOk = false;
var progTimer = null;
var searchDebounce = null;
var searchResults = [];

// Page navigation
var curPage = 'home';
function showPage(pg) {
  curPage = pg;
  document.querySelectorAll('.pg').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.ntab').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('pg-' + pg).classList.add('active');
  document.getElementById('nt-' + pg).classList.add('active');
  if (pg === 'home') renderHome();
}

// History tracking
var playHistory = JSON.parse(localStorage.getItem('ch_hist') || '[]');

function renderHome() {
  var h = new Date().getHours();
  var greet = h < 12 ? 'GOOD MORNING' : h < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
  document.getElementById('home-greeting').textContent = greet;

  var el = document.getElementById('home-content');
  var html = '';

  if (playHistory.length) {
    html += '<div class="sec"><div class="sec-head"><div class="sec-title">Recently Played</div></div>';
    html += '<div class="hscroll">';
    for (var i = 0; i < Math.min(playHistory.length, 10); i++) {
      var s = playHistory[i];
      html += '<div class="hcard" data-hist-idx="' + i + '">'
        + '<img src="' + s.thumb + '" loading="lazy"/>'
        + '<div class="hcard-title">' + esc(s.title) + '</div>'
        + '<div class="hcard-artist">' + esc(s.artist) + '</div>'
        + '</div>';
    }
    html += '</div></div>';
  }

  if (liked.length) {
    html += '<div class="sec"><div class="sec-head"><div class="sec-title">Liked Songs</div></div>';
    html += '<div class="hscroll">';
    for (var j = 0; j < Math.min(liked.length, 10); j++) {
      var ls = liked[j];
      html += '<div class="hcard" data-liked-idx="' + j + '">'
        + '<img src="' + ls.thumb + '" loading="lazy"/>'
        + '<div class="hcard-title">' + esc(ls.title) + '</div>'
        + '<div class="hcard-artist">' + esc(ls.artist) + '</div>'
        + '</div>';
    }
    html += '</div></div>';
  }

  if (!playHistory.length && !liked.length) {
    html = '<div class="home-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Search for songs to get started</p></div>';
  }

  el.innerHTML = html;

  // Event delegation for home cards
  el.onclick = function(e) {
    var hcard = e.target.closest('.hcard');
    if (!hcard) return;
    if (hcard.hasAttribute('data-hist-idx')) {
      var idx = parseInt(hcard.getAttribute('data-hist-idx'), 10);
      playSong(playHistory[idx], playHistory, idx);
    } else if (hcard.hasAttribute('data-liked-idx')) {
      var idx2 = parseInt(hcard.getAttribute('data-liked-idx'), 10);
      playSong(liked[idx2], liked, idx2);
    }
  };
}

// YouTube API
function onYouTubeIframeAPIReady() {
  yt = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
    events: {
      onReady: function() { ytOk = true; yt.setVolume(100); },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) { setIcons(true); startProg(); }
        else if (e.data === YT.PlayerState.PAUSED) { setIcons(false); stopProg(); }
        else if (e.data === YT.PlayerState.ENDED) {
          stopProg();
          if (repeatMode === 2) { yt.seekTo(0); yt.playVideo(); }
          else nextSong();
        }
      }
    }
  });
}
(function() {
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

// Search
document.getElementById('search-input').addEventListener('input', function() {
  var val = this.value.trim();
  clearTimeout(searchDebounce);
  if (!val) { setStatus('idle'); searchResults = []; renderResults(); return; }
  setStatus('loading');
  searchDebounce = setTimeout(function() { doSearch(val); }, 600);
});

function doSearch(q) {
  fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=15&q=' + encodeURIComponent(q) + '&key=' + YT_KEY)
    .then(function(r) { return r.json(); })
    .then(function(j) {
      searchResults = (j.items || []).filter(function(i) { return i.id && i.id.videoId; }).map(function(i) {
        return {
          id: i.id.videoId,
          title: i.snippet.title,
          artist: i.snippet.channelTitle,
          thumb: (i.snippet.thumbnails.medium || {}).url || 'https://img.youtube.com/vi/' + i.id.videoId + '/mqdefault.jpg'
        };
      });
      setStatus(searchResults.length ? 'hidden' : 'empty');
      renderResults();
    })
    .catch(function() { setStatus('empty'); });
}

function renderResults() {
  var el = document.getElementById('results');
  if (!searchResults.length) { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < searchResults.length; i++) {
    var s = searchResults[i];
    var l = isLiked(s.id);
    var p = curSong && curSong.id === s.id;
    html += '<div class="row" data-idx="' + i + '">'
      + '<img src="' + s.thumb + '" loading="lazy"/>'
      + '<div class="row-info">'
      + '<div class="row-title' + (p ? ' playing' : '') + '">' + esc(s.title) + '</div>'
      + '<div class="row-artist">' + esc(s.artist) + '</div>'
      + '</div>'
      + '<button class="like-btn' + (l ? ' liked' : '') + '" data-song-id="' + s.id + '">'
      + (l ? heartFull() : heartEmpty())
      + '</button>'
      + '</div>';
  }
  el.innerHTML = html;
}

// Event delegation for results - no inline handlers
document.getElementById('results').addEventListener('click', function(e) {
  var likeBtn = e.target.closest('.like-btn');
  if (likeBtn) {
    var sid = likeBtn.getAttribute('data-song-id');
    var song = searchResults.find(function(s) { return s.id === sid; });
    if (song) toggleLike(song);
    return;
  }
  var row = e.target.closest('.row');
  if (row) {
    var idx = parseInt(row.getAttribute('data-idx'), 10);
    if (!isNaN(idx) && searchResults[idx]) playSong(searchResults[idx], searchResults, idx);
  }
});

// Playback
function playSong(song, q, idx) {
  curSong = song;
  queue = q && q.length ? q : [song];
  qIdx = typeof idx === 'number' ? idx : 0;

  document.getElementById('mini-img').src = song.thumb;
  document.getElementById('mini-title').textContent = song.title;
  document.getElementById('mini-artist').textContent = song.artist;
  document.getElementById('mini').classList.add('show');
  document.getElementById('np-art').src = song.thumb;
  document.getElementById('np-title').textContent = song.title;
  document.getElementById('np-artist-txt').textContent = song.artist;
  updateHeart();
  renderResults();

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: song.title, artist: song.artist, album: 'Chopify',
      artwork: [{ src: song.thumb, sizes: '320x180', type: 'image/jpeg' }]
    });
    navigator.mediaSession.setActionHandler('play', function() { yt && yt.playVideo(); });
    navigator.mediaSession.setActionHandler('pause', function() { yt && yt.pauseVideo(); });
    navigator.mediaSession.setActionHandler('nexttrack', nextSong);
    navigator.mediaSession.setActionHandler('previoustrack', prevSong);
  }

  // Track history
  playHistory = [song].concat(playHistory.filter(function(s) { return s.id !== song.id; })).slice(0, 30);
  localStorage.setItem('ch_hist', JSON.stringify(playHistory));

  if (ytOk) yt.loadVideoById(song.id);
}

function togglePlayback() {
  if (!ytOk || !curSong) return;
  yt.getPlayerState() === YT.PlayerState.PLAYING ? yt.pauseVideo() : yt.playVideo();
}

function nextSong() {
  if (!queue.length) return;
  var n = isShuffle ? Math.floor(Math.random() * queue.length) : (qIdx + 1) % queue.length;
  playSong(queue[n], queue, n);
}

function prevSong() {
  if (!queue.length) return;
  if (ytOk && yt.getCurrentTime() > 3) { yt.seekTo(0); return; }
  var n = (qIdx - 1 + queue.length) % queue.length;
  playSong(queue[n], queue, n);
}

function setIcons(p) {
  isPlaying = p;
  var pause = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  var play = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('mini-icon').innerHTML = p ? pause : play;
  document.getElementById('np-icon').innerHTML = p ? pause : play;
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = p ? 'playing' : 'paused';
}

function startProg() {
  stopProg();
  progTimer = setInterval(function() {
    if (!ytOk) return;
    var c = yt.getCurrentTime() || 0;
    var d = yt.getDuration() || 0;
    var pct = d ? (c / d * 100) : 0;
    document.getElementById('np-bar-fill').style.width = pct + '%';
    document.getElementById('mini-prog-fill').style.width = pct + '%';
    document.getElementById('np-cur').textContent = fmt(c);
    document.getElementById('np-dur').textContent = fmt(d);
  }, 500);
}
function stopProg() { clearInterval(progTimer); }
function fmt(s) { s = Math.floor(s); return Math.floor(s/60) + ':' + String(s % 60).padStart(2, '0'); }

// Likes
function isLiked(id) { return liked.some(function(s) { return s.id === id; }); }
function toggleLike(song) {
  if (isLiked(song.id)) { liked = liked.filter(function(s) { return s.id !== song.id; }); }
  else { liked.unshift(song); }
  localStorage.setItem('ch_liked', JSON.stringify(liked));
  if (curSong && curSong.id === song.id) updateHeart();
  renderResults();
}
function updateHeart() {
  if (!curSong) return;
  var l = isLiked(curSong.id);
  var btn = document.getElementById('np-heart-btn');
  btn.classList.toggle('liked', l);
  btn.innerHTML = l ? heartFull() : heartEmpty();
}
function heartEmpty() {
  return '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
}
function heartFull() {
  return '<svg width="24" height="24" fill="#1db954" stroke="#1db954" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
}

// Escape HTML
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Status
function setStatus(state) {
  var el = document.getElementById('status');
  if (state === 'hidden') { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  if (state === 'loading') {
    el.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  } else if (state === 'empty') {
    el.innerHTML = '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No results found</p>';
  } else {
    el.innerHTML = '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Search for a song to get started</p>';
  }
}

// Now playing open/close
document.getElementById('mini-row').addEventListener('click', function() {
  document.getElementById('np').classList.add('open');
});
document.getElementById('np-close-btn').addEventListener('click', function() {
  document.getElementById('np').classList.remove('open');
});

// Swipe down to close NP
var _sy = 0;
document.getElementById('np').addEventListener('touchstart', function(e) { _sy = e.touches[0].clientY; }, { passive: true });
document.getElementById('np').addEventListener('touchend', function(e) {
  if (e.changedTouches[0].clientY - _sy > 80) document.getElementById('np').classList.remove('open');
}, { passive: true });

// Seek
document.getElementById('np-bar').addEventListener('click', function(e) {
  if (!ytOk || !curSong) return;
  yt.seekTo((e.offsetX / this.offsetWidth) * (yt.getDuration() || 0));
});

// All button listeners - addEventListener only, no inline handlers
document.getElementById('mini-play-btn').addEventListener('click', function(e) { e.stopPropagation(); togglePlayback(); });
document.getElementById('mini-prev-btn').addEventListener('click', function(e) { e.stopPropagation(); prevSong(); });
document.getElementById('mini-next-btn').addEventListener('click', function(e) { e.stopPropagation(); nextSong(); });
document.getElementById('np-play-btn').addEventListener('click', togglePlayback);
document.getElementById('np-prev-btn').addEventListener('click', prevSong);
document.getElementById('np-next-btn').addEventListener('click', nextSong);
document.getElementById('np-heart-btn').addEventListener('click', function() { if (curSong) toggleLike(curSong); });
document.getElementById('shuffle-btn').addEventListener('click', function() {
  isShuffle = !isShuffle;
  this.style.color = isShuffle ? '#1db954' : '#a0a0a0';
});
document.getElementById('repeat-btn').addEventListener('click', function() {
  repeatMode = (repeatMode + 1) % 3;
  this.style.color = repeatMode > 0 ? '#1db954' : '#a0a0a0';
});

// Init
renderHome();
</script>

</body>
</html>
