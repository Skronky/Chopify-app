<!DOCTYPE html><html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Chopify</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:'Outfit',sans-serif; background:#0a0a0a; color:#fff; overflow:hidden; -webkit-font-smoothing:antialiased; }
#app { display:flex; flex-direction:column; height:100vh; height:100dvh; }
#page { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:200px; }
::-webkit-scrollbar { width:0; }/* SEARCH */
#search-wrap { padding:56px 16px 12px; background:#0a0a0a; position:sticky; top:0; z-index:10; }
#search-box { display:flex; align-items:center; gap:10px; background:#1c1c1c; border-radius:12px; padding:12px 16px; border:1px solid #2c2c2c; }
#search-box svg { color:#555; flex-shrink:0; }
#search-input { flex:1; background:none; border:none; outline:none; font-size:15px; font-family:'Outfit',sans-serif; color:#fff; }
#search-input::placeholder { color:#555; }
/* RESULTS */
#results { display:flex; flex-direction:column; }
.row { display:flex; align-items:center; gap:12px; padding:10px 16px; transition:background 0.15s; }
.row img { width:52px; height:52px; border-radius:10px; object-fit:cover; background:#242424; flex-shrink:0; pointer-events:none; }
.row-info { flex:1; min-width:0; pointer-events:none; }
.row-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-title.playing { color:#1db954; }
.row-artist { font-size:12px; color:#a0a0a0; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.like-btn { background:none; border:none; cursor:pointer; padding:8px; color:#555; display:flex; flex-shrink:0; transition:color 0.2s, transform 0.15s; }
.like-btn.liked { color:#1db954; }
/* STATUS */
#status { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:12px; color:#555; text-align:center; }
#status p { font-size:14px; }
.dots { display:flex; gap:6px; }
.dot { width:7px; height:7px; border-radius:50%; background:#1db954; animation:bounce 1.1s infinite; }
.dot:nth-child(2){animation-delay:.18s} .dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* MINI PLAYER */
#mini {
position:fixed; bottom:calc(60px + env(safe-area-inset-bottom,0px)); left:8px; right:8px;
background:#1c1c1c; border:1px solid #2c2c2c; border-radius:14px;
padding:10px 14px;
display:flex; flex-direction:column; gap:10px;
z-index:50;
opacity:0; transform:translateY(16px); pointer-events:none;
transition:opacity 0.3s ease, transform 0.3s ease;
}
#mini.show { opacity:1; transform:translateY(0); pointer-events:all; }
#mini-prog { height:2px; background:#2c2c2c; border-radius:1px; }
#mini-prog-fill { height:100%; background:#1db954; border-radius:1px; width:0%; transition:width 0.5s linear; }
#mini-row { display:flex; align-items:center; gap:12px; cursor:pointer; }
#mini-img { width:46px; height:46px; border-radius:8px; object-fit:cover; background:#242424; flex-shrink:0; }
#mini-info { flex:1; min-width:0; }
#mini-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#mini-artist { font-size:11px; color:#a0a0a0; margin-top:2px; }
#mini-btns { display:flex; align-items:center; gap:16px; }
#mini-btns button { background:none; border:none; color:#fff; cursor:pointer; padding:4px; display:flex; }
/* NOW PLAYING */
#np {
position:fixed; inset:0; z-index:100;
background:#0a0a0a;
display:flex; flex-direction:column;
padding-top:env(safe-area-inset-top,24px);
transform:translateY(100%);
transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#np.open { transform:translateY(0); }
#np-close-btn { background:none; border:none; color:#888; cursor:pointer; padding:14px 20px; display:flex; align-items:center; gap:8px; font-size:14px; font-family:'Outfit',sans-serif; }
#np-art-wrap { padding:0 32px 24px; }
#np-art { width:100%; aspect-ratio:1; border-radius:16px; object-fit:cover; background:#1c1c1c; display:block; box-shadow:0 16px 48px rgba(0,0,0,0.6); transition:opacity 0.3s ease; }
#np-info-row { display:flex; align-items:center; padding:0 24px 16px; gap:12px; }
#np-texts { flex:1; min-width:0; }
#np-title { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#np-artist-txt { font-size:14px; color:#a0a0a0; margin-top:4px; }
#np-heart-btn { background:none; border:none; cursor:pointer; color:#555; padding:6px; display:flex; flex-shrink:0; }
#np-heart-btn.liked { color:#1db954; }
#np-prog-section { padding:0 24px 8px; }
#np-bar { width:100%; height:4px; background:#242424; border-radius:2px; margin-bottom:8px; cursor:pointer; }
#np-bar-fill { height:100%; background:#fff; border-radius:2px; width:0%; pointer-events:none; }
#np-times { display:flex; justify-content:space-between; font-size:11px; color:#555; }
#np-ctrl-row { display:flex; align-items:center; justify-content:space-between; padding:16px 32px 0; }
#np-ctrl-row button { background:none; border:none; cursor:pointer; color:#a0a0a0; padding:8px; display:flex; align-items:center; }
#np-ctrl-row button.active { color:#1db954; }
#np-play-btn { width:62px; height:62px; border-radius:50%; background:#fff !important; color:#000 !important; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#np-play-btn:active { transform:scale(0.95); }

/* BOTTOM NAV */
#bnav { position:fixed; bottom:0; left:0; right:0; height:calc(60px + env(safe-area-inset-bottom,0px)); background:#0d0d0d; border-top:1px solid #2c2c2c; display:flex; align-items:flex-start; padding-top:8px; z-index:60; }
.ntab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; color:#555; border:none; background:none; font-family:'Outfit',sans-serif; transition:color 0.2s; }
.ntab.active { color:#1db954; }
.ntab span { font-size:10px; font-weight:600; }
/* PAGES */
.pg { display:none; }
.pg.active { display:block; }
/* PLAYLISTS PAGE */
#pl-header { padding:56px 20px 20px; display:flex; align-items:center; justify-content:space-between; }
#pl-header h1 { font-family:"Bebas Neue",sans-serif; font-size:42px; }
#new-pl-btn { background:none; border:none; color:#1db954; cursor:pointer; padding:4px; display:flex; }
#pl-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 16px; }
.pl-card { background:#1c1c1c; border-radius:14px; padding:14px; cursor:pointer; border:1px solid #2c2c2c; }
.pl-card:active { background:#242424; }
.pl-card-art { width:100%; aspect-ratio:1; border-radius:10px; background:#242424; margin-bottom:10px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; gap:2px; }
.pl-card-art img { width:100%; height:100%; object-fit:cover; }
.pl-card-art.empty { display:flex; align-items:center; justify-content:center; color:#555; }
.pl-card-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pl-card-count { font-size:11px; color:#a0a0a0; margin-top:2px; }
/* PLAYLIST VIEW */
#plv-header { padding:56px 20px 20px; }
#plv-back { background:none; border:none; color:#a0a0a0; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:14px; font-family:"Outfit",sans-serif; padding:0 0 16px; }
#plv-art { width:160px; height:160px; border-radius:14px; background:#242424; margin-bottom:16px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; gap:2px; }
#plv-art img { width:100%; height:100%; object-fit:cover; }
#plv-art.empty { display:flex; align-items:center; justify-content:center; color:#555; }
#plv-name { font-family:"Bebas Neue",sans-serif; font-size:36px; letter-spacing:0.5px; }
#plv-meta { font-size:13px; color:#a0a0a0; margin-top:4px; }
#plv-actions { display:flex; gap:10px; margin-top:16px; }
#plv-play-btn { display:flex; align-items:center; gap:8px; background:#1db954; border:none; border-radius:24px; padding:10px 22px; font-size:13px; font-weight:700; font-family:"Outfit",sans-serif; color:#000; cursor:pointer; }
#plv-play-btn:active { background:#1ed760; }
#plv-del-btn { background:none; border:1.5px solid #2c2c2c; border-radius:24px; padding:10px 18px; font-size:13px; font-weight:700; font-family:"Outfit",sans-serif; color:#a0a0a0; cursor:pointer; }
#plv-list { display:flex; flex-direction:column; }
/* NEW PLAYLIST MODAL */
#pl-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:none; align-items:flex-end; animation:fadeIn 0.2s ease; }
#pl-modal-overlay.open { display:flex; }
#pl-modal { background:#141414; border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px)); width:100%; animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1); }
#pl-modal h3 { font-family:"Bebas Neue",sans-serif; font-size:26px; margin-bottom:16px; }
#pl-modal input { width:100%; background:#242424; border:1.5px solid #2c2c2c; border-radius:12px; padding:13px 16px; font-size:15px; font-family:"Outfit",sans-serif; color:#fff; outline:none; margin-bottom:14px; }
#pl-modal input:focus { border-color:#1db954; }
#pl-modal-btns { display:flex; gap:10px; }
#pl-modal-cancel { flex:1; padding:12px; border-radius:24px; border:1.5px solid #2c2c2c; background:none; color:#a0a0a0; font-size:14px; font-weight:700; font-family:"Outfit",sans-serif; cursor:pointer; }
#pl-modal-create { flex:1; padding:12px; border-radius:24px; border:none; background:#1db954; color:#000; font-size:14px; font-weight:700; font-family:"Outfit",sans-serif; cursor:pointer; }
/* ADD TO PLAYLIST MODAL */
#atp-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:none; align-items:flex-end; animation:fadeIn 0.2s ease; }
#atp-overlay.open { display:flex; }
#atp-sheet { background:#141414; border-radius:20px 20px 0 0; padding:8px 0 calc(16px + env(safe-area-inset-bottom,0px)); width:100%; max-height:70vh; overflow-y:auto; animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1); }
#atp-handle { width:36px; height:4px; background:#2c2c2c; border-radius:2px; margin:10px auto 16px; }
#atp-title { font-family:"Bebas Neue",sans-serif; font-size:22px; padding:0 20px 12px; border-bottom:1px solid #2c2c2c; margin-bottom:8px; }
.atp-item { display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; }
.atp-item:active { background:#1c1c1c; }
.atp-item-art { width:44px; height:44px; border-radius:8px; background:#242424; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; gap:1px; flex-shrink:0; }
.atp-item-art img { width:100%; height:100%; object-fit:cover; }
.atp-item-art.empty { display:flex; align-items:center; justify-content:center; color:#555; }
.atp-item-name { font-size:14px; font-weight:500; }
.atp-item-count { font-size:12px; color:#a0a0a0; margin-top:2px; }
/* LIKED PAGE */
#liked-header { padding:56px 20px 20px; background:linear-gradient(180deg,#1a1540 0%,#0a0a0a 100%); }
#liked-header h1 { font-family:"Bebas Neue",sans-serif; font-size:48px; letter-spacing:0.5px; margin-bottom:4px; }
#liked-header p { font-size:13px; color:#a0a0a0; }
#liked-play-btn { display:flex; align-items:center; gap:8px; background:#1db954; border:none; border-radius:24px; padding:10px 22px; font-size:13px; font-weight:700; font-family:"Outfit",sans-serif; color:#000; cursor:pointer; margin-top:16px; }
#liked-play-btn:active { background:#1ed760; }
#liked-list { display:flex; flex-direction:column; }
/* HOME */
#home-header { padding:56px 20px 20px; }
#home-greeting { font-size:12px; font-weight:600; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:6px; }
#home-title { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:0.5px; line-height:1; }
#home-title span { color:#1db954; }
.sec { padding:8px 0 16px; }
.sec-head { display:flex; align-items:center; justify-content:space-between; padding:0 16px 12px; }
.sec-title { font-size:18px; font-weight:700; }
.hscroll { display:flex; gap:12px; padding:0 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.hscroll::-webkit-scrollbar { display:none; }
.hcard { flex-shrink:0; width:130px; cursor:pointer; }
.hcard img { width:130px; height:130px; border-radius:12px; object-fit:cover; background:#1c1c1c; margin-bottom:8px; display:block; }
.hcard-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hcard-artist { font-size:11px; color:#a0a0a0; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.home-empty { display:flex; flex-direction:column; align-items:center; padding:60px 20px; gap:12px; color:#555; text-align:center; }
.home-empty p { font-size:14px; }
</style>

</head>
<body>
<div id="app">
  <div id="page">
<!-- HOME PAGE -->
<div class="pg active" id="pg-home">
  <div id="home-header">
    <div id="home-greeting"></div>
    <div id="home-title">chop<span>ify</span></div>
  </div>
  <div id="home-content"></div>
</div>
<!-- LIKED PAGE -->
<div class="pg" id="pg-liked">
  <div id="liked-header">
    <h1>Liked Songs</h1>
    <p id="liked-count">0 songs</p>
    <button id="liked-play-btn">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Play All
    </button>
  </div>
  <div id="liked-list"></div>
</div>
<!-- PLAYLISTS PAGE -->
<div class="pg" id="pg-library">
  <div id="pl-header">
    <h1>Library</h1>
    <button id="new-pl-btn">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div id="pl-grid"></div>
</div>
<!-- PLAYLIST VIEW -->
<div class="pg" id="pg-plview">
  <div id="plv-header">
    <button id="plv-back">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Library
    </button>
    <div id="plv-art" class="empty"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
    <div id="plv-name">-</div>
    <div id="plv-meta">0 songs</div>
    <div id="plv-actions">
      <button id="plv-play-btn"><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play All</button>
      <button id="plv-del-btn">Delete</button>
    </div>
  </div>
  <div id="plv-list"></div>
</div>
<!-- SEARCH PAGE -->
<div class="pg" id="pg-search">
  <div id="search-wrap">
    <div id="search-box">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Search songs, artists..." autocomplete="off" autocorrect="off" autocapitalize="off"/>
    </div>
  </div>
  <div id="results"></div>
  <div id="status">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <p>Search for a song to get started</p>
  </div>
</div>
  </div>
</div>
<!-- BOTTOM NAV -->
<div id="bnav">
  <button class="ntab active" id="nt-home" onclick="showPage('home')">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </button>
  <button class="ntab" id="nt-search" onclick="showPage('search')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Search</span>
  </button>
  <button class="ntab" id="nt-liked" onclick="showPage('liked')">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <span>Liked</span>
  </button>
  <button class="ntab" id="nt-library" onclick="showPage('library')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>Library</span>
  </button>
</div>
<div id="mini">
  <div id="mini-prog"><div id="mini-prog-fill"></div></div>
  <div id="mini-row">
    <img id="mini-img" src="" alt=""/>
    <div id="mini-info">
      <div id="mini-title">-</div>
      <div id="mini-artist">Chopify</div>
    </div>
    <div id="mini-btns">
      <button id="mini-prev-btn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button id="mini-play-btn"><svg id="mini-icon" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="mini-next-btn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.35V16.3L8.5 12z"/><path d="M16 6h2v12h-2z"/></svg></button>
    </div>
  </div>
</div>
<div id="np">
  <button id="np-close-btn">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    Now Playing
  </button>
  <div id="np-art-wrap"><img id="np-art" src="" alt="" onerror="this.onerror=null;this.src=window._npThumb||this.src;this.style.opacity='1';"/></div>
  <div id="np-info-row">
    <div id="np-texts">
      <div id="np-title">-</div>
      <div id="np-artist-txt">Select a song</div>
    </div>
    <button id="np-heart-btn">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>
  <div id="np-prog-section">
    <div id="np-bar"><div id="np-bar-fill"></div></div>
    <div id="np-times"><span id="np-cur">0:00</span><span id="np-dur">0:00</span></div>
  </div>
  <div id="np-ctrl-row">
    <button id="shuffle-btn"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></button>

var YT_KEY = 'AIzaSyCk_AuxfMGwuPxsrp7K-UV7nH6D76EZn9M';

var curPage = 'home';
function showPage(pg) {

document.querySelectorAll('.ntab').forEach(function(el) { el.classList.remove('active'); });

var el = document.getElementById('liked-list');
if (!liked.length) {
el.innerHTML = '<div class="home-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>Songs you like will appear here</p></div>';

}
var html = '';
for (var i = 0; i < liked.length; i++) {
var s = liked[i];

var idx = parseInt(row.getAttribute('data-liked-play'), 10);
playSong(liked[idx], liked, idx);
}
};
}

var recs = [];
var recsLoaded = false;

function fetchRecs() {
if (!playHistory.length) return;
var seed = playHistory[0];
fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet&id=' + seed.id + '&key=' + YT_KEY)
.then(function(r) { return r.json(); })
.then(function(j) {
var tags = [];
if (j.items && j.items.length && j.items[0].snippet.tags) {
tags = j.items[0].snippet.tags;
}
var artist = seed.artist.replace(/ - Topic$/i, '').replace(/VEVO$/i, '').replace(/official$/i, '').trim().toLowerCase();
var title = seed.title.toLowerCase();
var genreTags = tags.filter(function(t) {
var tl = t.toLowerCase();
return tl !== artist && !title.includes(tl) && !tl.includes(artist) && t.length > 3 && t.length < 30;
}).slice(0, 3);
var q;
if (genreTags.length) {
q = encodeURIComponent(genreTags.join(' ') + ' music');
} else {
q = encodeURIComponent(artist + ' music');
}
return fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=15&q=' + q + '&key=' + YT_KEY);
})
.then(function(r) { return r.json(); })
.then(function(j) {
if (!j.items) { recsLoaded = true; renderHome(); return; }
var seen = {};
playHistory.forEach(function(s) { seen[s.id] = true; });
liked.forEach(function(s) { seen[s.id] = true; });
recs = j.items
.filter(function(i) { return i.id && i.id.videoId && !seen[i.id.videoId]; })
.map(function(i) {
return {
id: i.id.videoId,
title: i.snippet.title,
artist: i.snippet.channelTitle,
thumb: (i.snippet.thumbnails.high || i.snippet.thumbnails.medium || {}).url || 'https://img.youtube.com/vi/' + i.id.videoId + '/maxresdefault.jpg'
};
}).slice(0, 10);
recsLoaded = true;
renderHome();
})
.catch(function() { recsLoaded = true; renderHome(); });
}

function renderHome() {
var h = new Date().getHours();
var greet = h < 12 ? 'GOOD MORNING' : h < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
document.getElementById('home-greeting').textContent = greet;
var el = document.getElementById('home-content');
var html = '';
if (playHistory.length) {
html += '<div class="sec"><div class="sec-head"><div class="sec-title">Recently Played</div></div>';
html += '<div class="hscroll">';
for (var i = 0; i < Math.min(playHistory.length, 10); i++) {
var s = playHistory[i];
html += '<div class="hcard" data-hist-idx="' + i + '">'
+ '<img src="' + (artCache[s.id] || s.thumb) + '" loading="lazy"/>'
+ '<div class="hcard-title">' + esc(s.title) + '</div>'
+ '<div class="hcard-artist">' + esc(s.artist) + '</div>'
+ '</div>';
}
html += '</div></div>';
}
if (recs.length) {
html += '<div class="sec"><div class="sec-head"><div class="sec-title">Recommended</div></div>';
html += '<div class="hscroll">';
for (var r = 0; r < recs.length; r++) {
var rc = recs[r];
html += '<div class="hcard" data-rec-idx="' + r + '">'
+ '<img src="' + (artCache[rc.id] || rc.thumb) + '" loading="lazy"/>'
+ '<div class="hcard-title">' + esc(rc.title) + '</div>'
+ '<div class="hcard-artist">' + esc(rc.artist) + '</div>'
+ '</div>';
}
html += '</div></div>';
} else if (playHistory.length && !recsLoaded) {
html += '<div class="sec"><div class="sec-head"><div class="sec-title">Recommended</div></div>'
+ '<div style="padding:0 16px 8px;color:#555;font-size:13px;">Loading…</div></div>';
}
if (liked.length) {
html += '<div class="sec"><div class="sec-head"><div class="sec-title">Liked Songs</div></div>';
html += '<div class="hscroll">';
for (var j = 0; j < Math.min(liked.length, 10); j++) {
var ls = liked[j];
html += '<div class="hcard" data-liked-idx="' + j + '">'
+ '<img src="' + (artCache[ls.id] || ls.thumb) + '" loading="lazy"/>'
+ '<div class="hcard-title">' + esc(ls.title) + '</div>'
+ '<div class="hcard-artist">' + esc(ls.artist) + '</div>'
+ '</div>';
}
html += '</div></div>';
}
if (!playHistory.length && !liked.length) {
html = '<div class="home-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Search for songs to get started</p></div>';
}
el.innerHTML = html;
el.onclick = function(e) {
var hcard = e.target.closest('.hcard');
if (!hcard) return;
if (hcard.hasAttribute('data-hist-idx')) {
var idx = parseInt(hcard.getAttribute('data-hist-idx'), 10);
playSong(playHistory[idx], playHistory, idx);
} else if (hcard.hasAttribute('data-rec-idx')) {
var idx2 = parseInt(hcard.getAttribute('data-rec-idx'), 10);
playSong(recs[idx2], recs, idx2);
} else if (hcard.hasAttribute('data-liked-idx')) {
var idx3 = parseInt(hcard.getAttribute('data-liked-idx'), 10);
playSong(liked[idx3], liked, idx3);
}
};
}

function onYouTubeIframeAPIReady() {
console.log('Chopify: YouTube API ready');
yt = new YT.Player('yt-player', {
height: '180', width: '320',
playerVars: { autoplay: 0, controls: 0, playsinline: 0 },
events: {
onReady: function() { ytOk = true; yt.setVolume(100); console.log('Chopify: YT player ready'); },
onStateChange: function(e) {
if (e.data === YT.PlayerState.PLAYING) {
setIcons(true); startProg();
tryPiP();
}
else if (e.data === YT.PlayerState.PAUSED) { setIcons(false); stopProg(); }
else if (e.data === YT.PlayerState.ENDED) {
stopProg();
if (repeatMode === 2) { yt.seekTo(0); yt.playVideo(); }
else nextSong();
}
}
}
});
}
(function() {
var s = document.createElement('script');
s.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(s);
})();

function tryPiP() {
var iframe = document.getElementById('yt-player');
if (!iframe) return;
var video = iframe.querySelector('video');
if (!video) {
setTimeout(tryPiP, 1000);
return;
}
if (document.pictureInPictureElement) {
document.exitPictureInPicture().then(function() {
requestPiP(video);
}).catch(function() {
requestPiP(video);
});
} else {
requestPiP(video);
}
}

function requestPiP(video) {
if (!document.pictureInPictureEnabled) return;
if (video.readyState >= 1) {
video.requestPictureInPicture().then(function() {
console.log('Chopify: PiP activated');
}).catch(function(err) {
console.warn('Chopify: PiP failed', err);
setTimeout(function() { tryPiP(); }, 1000);
});
} else {
video.addEventListener('loadedmetadata', function onLoaded() {
video.removeEventListener('loadedmetadata', onLoaded);
requestPiP(video);
});
}
}

document.getElementById('search-input').addEventListener('input', function() {
var val = this.value.trim();
clearTimeout(searchDebounce);
if (!val) { setStatus('idle'); searchResults = []; renderResults(); return; }
setStatus('loading');
searchDebounce = setTimeout(function() { doSearch(val); }, 600);
});

function doSearch(q) {
fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=15&q=' + encodeURIComponent(q) + '&key=' + YT_KEY)
.then(function(r) { return r.json(); })
.then(function(j) {
searchResults = (j.items || []).filter(function(i) { return i.id && i.id.videoId; }).map(function(i) {
return {
id: i.id.videoId,
title: i.snippet.title,
artist: i.snippet.channelTitle,
thumb: (i.snippet.thumbnails.high || i.snippet.thumbnails.medium || {}).url || 'https://img.youtube.com/vi/' + i.id.videoId + '/maxresdefault.jpg'
};
});
setStatus(searchResults.length ? 'hidden' : 'empty');
renderResults();
})
.catch(function() { setStatus('empty'); });
}

function renderResults() {
var el = document.getElementById('results');
if (!searchResults.length) { el.innerHTML = ''; return; }
var html = '';
for (var i = 0; i < searchResults.length; i++) {
var s = searchResults[i];
var l = isLiked(s.id);
var p = curSong && curSong.id === s.id;
html += '<div class="row" data-idx="' + i + '">'
+ '<img src="' + (artCache[s.id] || s.thumb) + '" loading="lazy"/>'
+ '<div class="row-info">'
+ '<div class="row-title' + (p ? ' playing' : '') + '">' + esc(s.title) + '</div>'
+ '<div class="row-artist">' + esc(s.artist) + '</div>'
+ '</div>'
+ '<button class="like-btn' + (l ? ' liked' : '') + '" data-song-id="' + s.id + '">'
+ (l ? heartFull() : heartEmpty())
+ '</button>'
+ '</div>';
}
el.innerHTML = html;
}

document.getElementById('results').addEventListener('click', function(e) {
var likeBtn = e.target.closest('.like-btn');
if (likeBtn) {
var sid = likeBtn.getAttribute('data-song-id');
var song = searchResults.find(function(s) { return s.id === sid; });
if (song) toggleLike(song);
return;
}
var row = e.target.closest('.row');
if (row) {
var idx = parseInt(row.getAttribute('data-idx'), 10);
if (!isNaN(idx) && searchResults[idx]) playSong(searchResults[idx], searchResults, idx);
}
});

function applyArt(songId, artUrl) {
artCache[songId] = artUrl;
if (curSong && curSong.id === songId) {
document.getElementById('mini-img').src = artUrl;
setNPArt(artUrl);
}
var rows = document.querySelectorAll('#results .row[data-idx]');
for (var i = 0; i < rows.length; i++) {
var idx = parseInt(rows[i].getAttribute('data-idx'), 10);
if (searchResults[idx] && searchResults[idx].id === songId) {
var img = rows[i].querySelector('img');
if (img) img.src = artUrl;
}
}
var hcards = document.querySelectorAll('.hcard');
for (var j = 0; j < hcards.length; j++) {
var card = hcards[j];
var sid = null;
if (card.hasAttribute('data-hist-idx')) sid = (playHistory[parseInt(card.getAttribute('data-hist-idx'),10)] || {}).id;
else if (card.hasAttribute('data-rec-idx')) sid = (recs[parseInt(card.getAttribute('data-rec-idx'),10)] || {}).id;
else if (card.hasAttribute('data-liked-idx')) sid = (liked[parseInt(card.getAttribute('data-liked-idx'),10)] || {}).id;
if (sid === songId) { var himg = card.querySelector('img'); if (himg) himg.src = artUrl; }
}
var likedRows = document.querySelectorAll('#liked-list .row');
for (var k = 0; k < likedRows.length; k++) {
if (liked[k] && liked[k].id === songId) {
var limg = likedRows[k].querySelector('img');
if (limg) limg.src = artUrl;
}
}
}

function fetchAlbumArt(song) {
if (artCache[song.id]) {
setNPArt(artCache[song.id]);
if (curSong && curSong.id === song.id) document.getElementById('mini-img').src = artCache[song.id];
return;
}
try {
var artist = song.artist.replace(/ - Topic$/i,'').replace(/VEVO$/i,'').replace(/official$/i,'').trim();
var title = song.title.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/-.*$/,'').trim();
var q = encodeURIComponent(title + ' ' + artist);
console.log('Chopify: fetching album art for', title);
fetch('/api/itunes?q=' + q)
.then(function(r) {
console.log('Chopify: iTunes response status', r.status);
return r.json();
})
.then(function(j) {
console.log('Chopify: iTunes results', JSON.stringify(j).slice(0, 200));
if (!j.results || !j.results.length) {
var titleOnly = encodeURIComponent(title);
return fetch('/api/itunes?q=' + titleOnly)
.then(function(r2) { return r2.json(); })
.then(function(j2) {
if (!j2.results || !j2.results.length) return;
var art2 = j2.results[0].artworkUrl100;
if (!art2) return;
art2 = art2.replace('100x100bb.jpg', '600x600bb.jpg');
applyArt(song.id, art2);
});
}
var best = j.results[0];
for (var i = 0; i < j.results.length; i++) {
if (j.results[i].artistName && j.results[i].artistName.toLowerCase().indexOf(artist.toLowerCase().split(' ')[0]) > -1) {
best = j.results[i]; break;
}
}
var art = best.artworkUrl100;
if (!art) return;
art = art.replace('100x100bb.jpg', '600x600bb.jpg');
applyArt(song.id, art);
})
.catch(function(err) { console.error('Chopify: iTunes fetch error', err); });
} catch(e) { console.error('Chopify: fetchAlbumArt exception', e); }
}

function setNPArt(src) {
var npArt = document.getElementById('np-art');
if (!npArt) return;
npArt.style.opacity = '0';
setTimeout(function() {
npArt.src = src;
npArt.onload = function() { npArt.style.opacity = '1'; };
npArt.onerror = function() { npArt.src = window._npThumb || ''; npArt.style.opacity = '1'; };
}, 150);
}

function playSong(song, q, idx) {
curSong = song;
queue = q && q.length ? q : [song];
qIdx = typeof idx === 'number' ? idx : 0;
window._npThumb = song.thumb;
document.getElementById('mini-img').src = song.thumb;
document.getElementById('mini-title').textContent = song.title;
document.getElementById('mini-artist').textContent = song.artist;
document.getElementById('mini').classList.add('show');
document.getElementById('np-art').src = song.thumb;
document.getElementById('np-art').style.opacity = '1';
fetchAlbumArt(song);
document.getElementById('np-title').textContent = song.title;
document.getElementById('np-artist-txt').textContent = song.artist;
updateHeart();
renderResults();
if ('mediaSession' in navigator) {
navigator.mediaSession.metadata = new MediaMetadata({
title: song.title, artist: song.artist, album: 'Chopify',
artwork: [{ src: song.thumb, sizes: '320x180', type: 'image/jpeg' }]
});
navigator.mediaSession.setActionHandler('play', function() { yt && yt.playVideo(); });
navigator.mediaSession.setActionHandler('pause', function() { yt && yt.pauseVideo(); });
navigator.mediaSession.setActionHandler('nexttrack', nextSong);
navigator.mediaSession.setActionHandler('previoustrack', prevSong);
}
var isFirst = playHistory.length === 0;
playHistory = [song].concat(playHistory.filter(function(s) { return s.id !== song.id; })).slice(0, 30);
localStorage.setItem('ch_hist', JSON.stringify(playHistory));
if (isFirst || playHistory.length % 5 === 0) { recs = []; recsLoaded = false; fetchRecs(); }
if (ytOk) yt.loadVideoById(song.id);
}

function togglePlayback() {
if (!ytOk || !curSong) return;
yt.getPlayerState() === YT.PlayerState.PLAYING ? yt.pauseVideo() : yt.playVideo();
}
function nextSong() {
if (!queue.length) return;
var n = isShuffle ? Math.floor(Math.random() * queue.length) : (qIdx + 1) % queue.length;
playSong(queue[n], queue, n);
}
function prevSong() {
if (!queue.length) return;
if (ytOk && yt.getCurrentTime() > 3) { yt.seekTo(0); return; }
var n = (qIdx - 1 + queue.length) % queue.length;
playSong(queue[n], queue, n);
}
function setIcons(p) {
isPlaying = p;
var pause = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
var play = '<path d="M8 5v14l11-7z"/>';
document.getElementById('mini-icon').innerHTML = p ? pause : play;
document.getElementById('np-icon').innerHTML = p ? pause : play;
if ('mediaSession' in navigator) navigator.mediaSession.playbackState = p ? 'playing' : 'paused';
}
function startProg() {
stopProg();
progTimer = setInterval(function() {
if (!ytOk) return;
var c = yt.getCurrentTime() || 0;
var d = yt.getDuration() || 0;
var pct = d ? (c / d * 100) : 0;
document.getElementById('np-bar-fill').style.width = pct + '%';
document.getElementById('mini-prog-fill').style.width = pct + '%';
document.getElementById('np-cur').textContent = fmt(c);
document.getElementById('np-dur').textContent = fmt(d);
}, 500);
}
function stopProg() { clearInterval(progTimer); }
function fmt(s) { s = Math.floor(s); return Math.floor(s/60) + ':' + String(s % 60).padStart(2, '0'); }
function isLiked(id) { return liked.some(function(s) { return s.id === id; }); }
function toggleLike(song) {
if (isLiked(song.id)) { liked = liked.filter(function(s) { return s.id !== song.id; }); }
else { liked.unshift(song); }
localStorage.setItem('ch_liked', JSON.stringify(liked));
if (curSong && curSong.id === song.id) updateHeart();
renderResults();
}
function updateHeart() {
if (!curSong) return;
var l = isLiked(curSong.id);
var btn = document.getElementById('np-heart-btn');
btn.classList.toggle('liked', l);
btn.innerHTML = l ? heartFull() : heartEmpty();
}
function heartEmpty() {
return '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
}
function heartFull() {
return '<svg width="24" height="24" fill="#1db954" stroke="#1db954" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
}
function esc(s) {
s = String(s);
s = s.split('&').join('&amp;');
s = s.split('<').join('&lt;');
s = s.split('>').join('&gt;');
s = s.split('"').join('&quot;');
s = s.split("'").join('&#39;');
return s;
}
function setStatus(state) {
var el = document.getElementById('status');
if (state === 'hidden') { el.style.display = 'none'; return; }
el.style.display = 'flex';
if (state === 'loading') {
el.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
} else if (state === 'empty') {
el.innerHTML = '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No results found</p>';
} else {
el.innerHTML = '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Search for a song to get started</p>';
}
}
document.getElementById('mini-row').addEventListener('click', function() {
document.getElementById('np').classList.add('open');
});
document.getElementById('np-close-btn').addEventListener('click', function() {
document.getElementById('np').classList.remove('open');
});
var _sy = 0;
document.getElementById('np').addEventListener('touchstart', function(e) { _sy = e.touches[0].clientY; }, { passive: true });
document.getElementById('np').addEventListener('touchend', function(e) {
if (e.changedTouches[0].clientY - _sy > 80) document.getElementById('np').classList.remove('open');
}, { passive: true });
document.getElementById('np-bar').addEventListener('click', function(e) {
if (!ytOk || !curSong) return;
yt.seekTo((e.offsetX / this.offsetWidth) * (yt.getDuration() || 0));
});
document.getElementById('mini-play-btn').addEventListener('click', function(e) { e.stopPropagation(); togglePlayback(); });
document.getElementById('mini-prev-btn').addEventListener('click', function(e) { e.stopPropagation(); prevSong(); });
document.getElementById('mini-next-btn').addEventListener('click', function(e) { e.stopPropagation(); nextSong(); });
document.getElementById('np-play-btn').addEventListener('click', togglePlayback);
document.getElementById('np-prev-btn').addEventListener('click', prevSong);
document.getElementById('np-next-btn').addEventListener('click', nextSong);
document.getElementById('np-heart-btn').addEventListener('click', function() { if (curSong) toggleLike(curSong); });
document.getElementById('shuffle-btn').addEventListener('click', function() {
isShuffle = !isShuffle;
this.style.color = isShuffle ? '#1db954' : '#a0a0a0';
});
document.getElementById('repeat-btn').addEventListener('click', function() {
repeatMode = (repeatMode + 1) % 3;
this.style.color = repeatMode > 0 ? '#1db954' : '#a0a0a0';
});
document.getElementById('liked-play-btn').addEventListener('click', function() {
if (liked.length) playSong(liked[0], liked, 0);
});

var playlists = JSON.parse(localStorage.getItem('ch_pls') || '[]');
var activePlId = null;
var atpSong = null;
function savePls() { localStorage.setItem('ch_pls', JSON.stringify(playlists)); }
function plArtUrls(pl) {
var urls = [];
for (var i = 0; i < pl.songs.length && urls.length < 4; i++) {
if (pl.songs[i].thumb) urls.push(pl.songs[i].thumb);
}
return urls;
}
function plArtHTML(urls, cls) {
if (!urls.length) return '<div class="' + cls + ' empty"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>';
var imgs = urls.map(function(u) { return '<img src="' + u + '" loading="lazy"/>'; }).join('');
return '<div class="' + cls + '">' + imgs + '</div>';
}
function renderLibrary() {
var grid = document.getElementById('pl-grid');
if (!playlists.length) {
grid.innerHTML = '<div style="grid-column:1/-1;padding:40px 0;text-align:center;color:#555;font-size:14px">No playlists yet. Tap + to create one.</div>';
return;
}
var html = '';
for (var i = 0; i < playlists.length; i++) {
var pl = playlists[i];
var urls = plArtUrls(pl);
html += '<div class="pl-card" data-pl-id="' + pl.id + '">'
+ plArtHTML(urls, 'pl-card-art')
+ '<div class="pl-card-name">' + esc(pl.name) + '</div>'
+ '<div class="pl-card-count">' + pl.songs.length + ' song' + (pl.songs.length !== 1 ? 's' : '') + '</div>'
+ '</div>';
}
grid.innerHTML = html;
grid.onclick = function(e) {
var card = e.target.closest('.pl-card');
if (card) openPlaylistView(parseInt(card.getAttribute('data-pl-id'), 10));
};
}
function openPlaylistView(pid) {
activePlId = pid;
var pl = playlists.find(function(p) { return p.id === pid; });
if (!pl) return;
var urls = plArtUrls(pl);
document.getElementById('plv-art').outerHTML = plArtHTML(urls, 'pl-card-art').replace('pl-card-art', 'pl-card-art" id="plv-art');
document.getElementById('plv-name').textContent = pl.name;
document.getElementById('plv-meta').textContent = pl.songs.length + ' song' + (pl.songs.length !== 1 ? 's' : '');
renderPlvList(pl);
document.querySelectorAll('.pg').forEach(function(el) { el.classList.remove('active'); });
document.getElementById('pg-plview').classList.add('active');
}
function renderPlvList(pl) {
var el = document.getElementById('plv-list');
if (!pl.songs.length) {
el.innerHTML = '<div class="home-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Add songs from Search</p></div>';
return;
}
var html = '';
for (var i = 0; i < pl.songs.length; i++) {
var s = pl.songs[i];
html += '<div class="row" data-plv-idx="' + i + '">'
+ '<img src="' + s.thumb + '" loading="lazy"/>'
+ '<div class="row-info">'
+ '<div class="row-title' + (curSong && curSong.id === s.id ? ' playing' : '') + '">' + esc(s.title) + '</div>'
+ '<div class="row-artist">' + esc(s.artist) + '</div>'
+ '</div>'
+ '<button class="like-btn" data-remove-id="' + s.id + '" style="color:#e74c3c">'
+ '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>'
+ '</button>'
+ '</div>';
}
el.innerHTML = html;
el.onclick = function(e) {
var removeBtn = e.target.closest('[data-remove-id]');
if (removeBtn) {
var id = removeBtn.getAttribute('data-remove-id');
var pl2 = playlists.find(function(p) { return p.id === activePlId; });
if (pl2) { pl2.songs = pl2.songs.filter(function(s) { return s.id !== id; }); savePls(); openPlaylistView(activePlId); }
return;
}
var row = e.target.closest('.row');
if (row) {
var idx = parseInt(row.getAttribute('data-plv-idx'), 10);
var pl3 = playlists.find(function(p) { return p.id === activePlId; });
if (pl3) playSong(pl3.songs[idx], pl3.songs, idx);
}
};
}
document.getElementById('new-pl-btn').addEventListener('click', function() {
document.getElementById('pl-name-input').value = '';
document.getElementById('pl-modal-overlay').classList.add('open');
setTimeout(function() { document.getElementById('pl-name-input').focus(); }, 300);
});
document.getElementById('pl-modal-cancel').addEventListener('click', function() {
document.getElementById('pl-modal-overlay').classList.remove('open');
});
document.getElementById('pl-modal-overlay').addEventListener('click', function(e) {
if (e.target === this) this.classList.remove('open');
});
document.getElementById('pl-modal-create').addEventListener('click', function() {
var name = document.getElementById('pl-name-input').value.trim();
if (!name) return;
playlists.push({ id: Date.now(), name: name, songs: [] });
savePls();
document.getElementById('pl-modal-overlay').classList.remove('open');
renderLibrary();
});
document.getElementById('plv-back').addEventListener('click', function() { showPage('library'); });
document.getElementById('plv-play-btn').addEventListener('click', function() {
var pl = playlists.find(function(p) { return p.id === activePlId; });
if (pl && pl.songs.length) playSong(pl.songs[0], pl.songs, 0);
});
document.getElementById('plv-del-btn').addEventListener('click', function() {
if (!confirm('Delete this playlist?')) return;
playlists = playlists.filter(function(p) { return p.id !== activePlId; });
savePls();
showPage('library');
});
function openATP(song) {
atpSong = song;
var list = document.getElementById('atp-list');
if (!playlists.length) {
list.innerHTML = '<div style="padding:16px 20px;color:#555;font-size:14px">No playlists yet. Create one in Library.</div>';
} else {
var html = '';
for (var i = 0; i < playlists.length; i++) {
var pl = playlists[i];
var urls = plArtUrls(pl);
html += '<div class="atp-item" data-atp-id="' + pl.id + '">'
+ plArtHTML(urls, 'atp-item-art')
+ '<div><div class="atp-item-name">' + esc(pl.name) + '</div>'
+ '<div class="atp-item-count">' + pl.songs.length + ' songs</div></div>'
+ '</div>';
}
list.innerHTML = html;
}
document.getElementById('atp-overlay').classList.add('open');
list.onclick = function(e) {
var item = e.target.closest('.atp-item');
if (!item) return;
var pid = parseInt(item.getAttribute('data-atp-id'), 10);
var pl = playlists.find(function(p) { return p.id === pid; });
if (pl && atpSong) {
if (!pl.songs.some(function(s) { return s.id === atpSong.id; })) {
pl.songs.push(atpSong);
savePls();
}
}
document.getElementById('atp-overlay').classList.remove('open');
};
}
document.getElementById('atp-overlay').addEventListener('click', function(e) {
if (e.target === this) this.classList.remove('open');
});

console.log('Chopify: about to insert np-add-pl-btn...');
var heartBtn = document.getElementById('np-heart-btn');
if (heartBtn) {
  heartBtn.insertAdjacentHTML('afterend', '<button id="np-add-pl-btn" style="background:none;border:none;cursor:pointer;color:#555;padding:6px;display:flex;"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>');
  document.getElementById('np-add-pl-btn').addEventListener('click', function() {
    if (curSong) openATP(curSong);
  });
  console.log('Chopify: np-add-pl-btn inserted OK');
} else {
  console.error('Chopify: np-heart-btn not found! Cannot insert add-to-playlist button.');
}

document.getElementById('nt-library').addEventListener('click', function() { renderLibrary(); });
console.log('Chopify: all listeners attached, calling renderHome...');
renderHome();
console.log('Chopify: init complete');
</script>
